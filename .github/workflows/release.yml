name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0). Required for manual runs."
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: amd64
            runner: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            arch: arm64
            runner: ubuntu-22.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install build dependencies
        # libunwind-dev must be installed in its own apt invocation
        # before libgstreamer1.0-dev. GitHub-hosted ubuntu-22.04 runners
        # ship LLVM's libunwind-* packages preinstalled, which conflict
        # with the Debian libunwind-dev that gstreamer transitively
        # depends on. Pulling it in alone lets apt resolve the conflict
        # by removing the LLVM variant; doing it inline with gstreamer
        # makes the resolver give up with "held broken packages".
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libunwind-dev
          sudo apt-get install -y --no-install-recommends \
            pkg-config make cmake gcc g++ \
            libssl-dev \
            libfontconfig1-dev libfreetype6-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libegl1-mesa-dev libgbm-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-${{ matrix.target }}-

      - name: Build vidgenie (release)
        env:
          CARGO_PROFILE_RELEASE_LTO: "false"
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "1"
          CARGO_PROFILE_RELEASE_DEBUG: "0"
          CARGO_PROFILE_RELEASE_STRIP: "symbols"
        run: cargo build --release --locked --target ${{ matrix.target }} -p vg-cli

      - name: Package artifact
        id: pkg
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          name="vidgenie-${tag}-linux-${{ matrix.arch }}"
          mkdir -p dist "dist/${name}"
          cp "target/${{ matrix.target }}/release/vidgenie" "dist/${name}/vidgenie"
          chmod +x "dist/${name}/vidgenie"
          cp README.md "dist/${name}/README.md" 2>/dev/null || true
          tar -C dist -czf "dist/${name}.tar.gz" "${name}"
          ( cd dist && sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256" )
          echo "archive=dist/${name}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "checksum=dist/${name}.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: vidgenie-${{ matrix.arch }}
          path: |
            ${{ steps.pkg.outputs.archive }}
            ${{ steps.pkg.outputs.checksum }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: publish github release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.tar.gz.sha256' \) -exec cp {} release/ \;
          ls -la release

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: release/*
